server:
  port: 19091

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/v1/users/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/v1/orders/**

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/v1/products/**

        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/v1/companies/**

        - id: hub-service
          uri: lb://hub-service
          predicates:
            - Path=/v1/hubs/**

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/v1/deliveries/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/v1/ai/**

        - id: alarm-service
          uri: lb://alarm-service
          predicates:
            - Path=/v1/alarms/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/v1/auth/**

        # --- Swagger용 라우트 ---
        # Swagger 문서 요청 시 prefix 제거 전용
        - id: swagger-hub
          uri: lb://hub-service
          predicates:
            - Path=/hubs/v3/api-docs/**
          filters:
            - RewritePath=/hubs/(?<segment>.*), /${segment}

      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/
    register-with-eureka: true
    fetch-registry: true

springdoc:
  swagger-ui:
    path: /docs
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: none
    urls:
      - name: hub-service
        url: /hubs/v3/api-docs
  api-docs:
    path: /api-docs