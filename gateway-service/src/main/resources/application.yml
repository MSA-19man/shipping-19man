server:
  port: 19091

spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        - id: auth-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/v1/deliveries/**
        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/api/v1/companies/**
        - id: hub-service
          uri: lb://hub-service
          predicates:
            - Path=/v1/hubs/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/v1/ai/**

        - id: alarm-service
          uri: lb://alarm-service
          predicates:
            - Path=/v1/alarms/**

        # Swagger 문서용 라우팅
        - id: delivery-service-api-docs
          uri: lb://delivery-service
          predicates:
            - Path=/delivery-service/api-docs/**
          filters:
            - RewritePath=/delivery-service/api-docs, /api-docs
        - id: company-service-api-docs
          uri: lb://company-service
          predicates:
            - Path=/company-service/api-docs/**
          filters:
            - RewritePath=/company-service/api-docs, /api-docs
        - id: hub-service-api-docs
          uri: lb://hub-service
          predicates:
            - Path=/hub-service/api-docs/**
          filters:
            - RewritePath=/hub-service/api-docs, /api-docs
        - id: order-service-api-docs
          uri: lb://order-service
          predicates:
            - Path=/order-service/api-docs/**
          filters:
            - RewritePath=/order-service/api-docs, /api-docs
        - id: product-service-api-docs
          uri: lb://product-service
          predicates:
            - Path=/product-service/api-docs/**
          filters:
            - RewritePath=/product-service/api-docs, /api-docs

# 접근을 허용할 url
gateway:
  auth:
    excluded-paths:
      - /api/v1/**
      - /internal/v1/** # 마이크로 서비스간 통신을 위한 내부 api에 대한 접근 허용
#      - /api/v1/users/signup
#      - /api/v1/auth/login #- /api/v1/**      # 로컬 개발 테스트를 위한 임시 url,
#      - /error

jwt:
  secret:
    key: ${JWT_SECRET_KEY} #401b09eab3c013d4ca54922bb802bec8fd5318192b0a75f201d8b3727429080fb337591abd3e44453b954555b7a0812e1081c39b740293f765eae731f5a65ed1
  access-token-expiration: 3600000    # 1시간
  prefix: "Bearer "

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/
    register-with-eureka: true
    fetch-registry: true

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: delivery-service
        url: /delivery-service/api-docs
      - name: hub-service
        url: /hub-service/api-docs
      - name: company-service
        url: /company-service/api-docs