server:
  port: 9838

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/v1/users/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/v1/orders/**

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/v1/products/**

        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/v1/companies/**

        - id: hub-service
          uri: lb://hub-service
          predicates:
            - Path=/v1/hubs/**

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/v1/deliveries/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/v1/ai/**

        - id: alarm-service
          uri: lb://alarm-service
          predicates:
            - Path=/v1/alarms/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/v1/auth/**
      discovery:
        locator:
          enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
